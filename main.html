<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Cory Nash / frxst" />
    <meta name="description" content="Paradigm is an internet hangout for the indie web." />
    <link rel="icon" type="image/x-icon" href="images\favicon.png">
    <link href="index.css" rel="stylesheet"/>
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
    <script src="https://chattable.neocities.org/scripts/main.min.js"></script>
    <title>Paradigm: A Personal Web | frxst.io</title>
</head>
<body>
	<!--Weather Button-->
	<button id="weatherSelect">Change the Weather</button>
	<!--Weather Wrap-->
	<div class="weatherWrap">
	  <div class="condition"></div>
	</div> 

	<!--Splash Logo-->
	<a href="index.html">
	<img id="logo" src="images\logo.png" alt="paradigm logo"/>
	</a>

	<!--Banner-->
	<div class="banner">
		<marquee scrollamount="12" id="runnertext">
			Welcome to <b id="audiowide">PARADIGM</b>,
			a digital space by frxst
		</marquee>
	</div>

	<!--Content-->
	<div class="container" id="modeSelectNav">
		<div class="container">
			<a href="about.html">
				<img id="frxstCard" src="images\avatar.png" alt="frxst avatar">
				<div class="screen-overlay"></div>
				<div class="content">
					<h2>Frxst</h2>
					<p>Technomancer</p>
				</div>
			</a>
		</div>
		<div id="mainSpecterCard" class="container">
			<a href="specter.html">
				<img id="specterCard" src="images\Specter Midjourney Transparent.png" alt="specter card">
				<div class="screen-overlay"></div>
				<div class="content">
					<h2>Specter<b>.</b>EXE</h2>
					<p>NetNavi / Digital Familiar</p>
				</div>
			</a>
		</div>
		<div class="container">
			<a href="social.html">
				<img id="networkCard" src="images\networkCard.png" alt="paradigm network card">
				<div class="screen-overlay"></div>
				<div class="content">
					<h2>Network</h2>
					<p>Links / Social Media</p>
				</div>
			</a>
		</div>
		<div class="container">
			<a href="logs.html">
				<img id="logCard" src="images\logCard.png" alt="spellbook of changes">
				<div class="screen-overlay"></div>
				<div class="content">
					<h2>Logs</h2>
					<p>Version History</p>
				</div>
			</a>
			
		</div>
	</div>
	<iframe src='https://iframe.chat/embed?chat=paradigm' id='chattable' frameborder='none'></iframe>
		
	<footer>
		<form>
			<input id="sitesearch" type="search" name="q" placeholder="Keyword Search" />
			<input id="sitesearch-btn" type="submit" value="Enter" />
		</form>
		<p>© 2024 itsfrxst</p>
	</footer>

	<script 
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
		crossorigin="anonymous">
	</script>
	<script>
		function openNav() {
		document.getElementById("mySidenav").style.width = "250px";
		}
		
		function closeNav() {
		document.getElementById("mySidenav").style.width = "0";
		}
	</script>
	<script>
		chattable.initialize({
		  stylesheet : "chattable.css"
		});
	</script>
	<script>
		const weatherBtn = document.querySelector("#weatherSelect");
		const weatherCond = document.querySelector(".condition");

		weatherBtn.addEventListener("click", cycleWeather);

		function cycleWeather() {
			weatherCond.innerHTML = ""; // Clear previous
			if (weatherCond.classList.contains("snow")) {
				weatherCond.classList.remove("snow");
				weatherCond.classList.add("sunny");

				// Add sun with beams
				weatherCond.innerHTML = `
				<div class="sun">
					<div class="beams"></div>
				</div>
				`;
			} else {
				weatherCond.classList.remove("sunny");
				weatherCond.classList.add("snow");

				// Add snow visuals back if needed
				weatherCond.innerHTML = `<div class="snow"></div>`;
			}
			}
	</script>

</body>
</html>
